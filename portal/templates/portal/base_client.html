{% extends "portal/base.html" %}
{% load static i18n icons %}
{% block body %}
<div class="mobile-shell">
  <div class="mobile-topbar">
    <img src="{% static 'portal/img/logo-full.jpeg' %}" alt="Sahal Notary System" style="width:78px; height:auto; mix-blend-mode:multiply;">
    <div style="display:flex; align-items:center; gap:12px;">
      {% include "portal/includes/language_switcher.html" %}
      <span style="font-size:13px; color:var(--text-muted);">{{ request.user.get_full_name|default:request.user.username }}</span>
      <a href="{% url 'logout' %}" class="btn btn-ghost btn-icon-only btn-sm" title="{% trans 'Log Out' %}" aria-label="{% trans 'Log Out' %}">
        {% icon "arrow-right-on-rectangle" size=18 %}
      </a>
    </div>
  </div>
  <div class="mobile-shell-content">
    {% block client_content %}{% endblock %}
  </div>
</div>
{% endblock %}
